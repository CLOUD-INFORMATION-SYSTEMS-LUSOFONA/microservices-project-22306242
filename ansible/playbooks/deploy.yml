        state: started
        restart_policy: always
        pull: yes
        ports:
          - "8083:8083"
        env:
          JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
          SPRING_DATASOURCE_URL: "jdbc:postgresql://{{ rds_host }}:5432/microservicesdb"
          SPRING_DATASOURCE_USERNAME: "dbadmin"
          SPRING_DATASOURCE_PASSWORD: "{{ lookup('env', 'DB_PASSWORD') }}"
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
          SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
          SERVICES_USER_URL: "http://3.239.219.100:8081"
          SERVICES_PRODUCT_URL: "http://100.54.5.216:8082"
          CLOUD_SQS_PRODUCT_EVENTS_CONSUMER_ENABLED: "true"
          CLOUD_SQS_PRODUCT_EVENTS_CONSUMER_QUEUE_URL: "{{ sqs_url }}"
          CLOUD_SQS_PRODUCT_EVENTS_CONSUMER_REGION: "us-east-1"

- name: Deploy api-gateway
  hosts: gateway
  become: yes
  tasks:
    - name: Run api-gateway
      community.docker.docker_container:
        name: api-gateway
        image: goncfsoares/api-gateway:latest
        state: started
        restart_policy: always
        pull: yes
        ports:
          - "8080:8080"
        env:
          JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
          SERVICES_USER_URL: "http://3.239.219.100:8081"
          SERVICES_PRODUCT_URL: "http://100.54.5.216:8082"
          SERVICES_ORDER_URL: "http://3.239.235.47:8083"