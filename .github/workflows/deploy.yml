name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: goncfsoares/user-service:latest,goncfsoares/user-service:${{ github.sha }}

      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: goncfsoares/product-service:latest,goncfsoares/product-service:${{ github.sha }}

      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: goncfsoares/order-service:latest,goncfsoares/order-service:${{ github.sha }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: goncfsoares/api-gateway:latest,goncfsoares/api-gateway:${{ github.sha }}

  terraform:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init
        working-directory: infrastructure/terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: infrastructure/terraform/environments/dev
        env:
          TF_VAR_key_name: microservices-key
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

  ansible-deploy:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Get runner public IP
        id: ip
        run: echo "ip=$(curl -s ifconfig.me)" >> $GITHUB_OUTPUT

      - name: Add runner IP to security group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.APP_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32

      - name: Install Ansible
        run: |
          pip install "ansible==9.2.0"
          ansible-galaxy collection install community.docker

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/microservices-key.pem
          chmod 600 ~/.ssh/microservices-key.pem

      - name: Update inventory with current IPs
        run: |
          cat > ansible/inventory/hosts.ini << EOF
          [gateway]
          api-gateway ansible_host=${{ secrets.EC2_GATEWAY_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/microservices-key.pem

          [user_service]
          user-service ansible_host=${{ secrets.EC2_USER_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/microservices-key.pem

          [product_service]
          product-service ansible_host=${{ secrets.EC2_PRODUCT_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/microservices-key.pem

          [order_service]
          order-service ansible_host=${{ secrets.EC2_ORDER_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/microservices-key.pem

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible playbook
        run: ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/deploy.yml
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          
      - name: Remove runner IP from security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.APP_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32